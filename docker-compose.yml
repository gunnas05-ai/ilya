version: '3.8'

services:
  # ── PostgreSQL + PostGIS ──────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: kaptan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-kaptan}
      POSTGRES_PASSWORD: ${DB_PASS:?err}
      POSTGRES_DB: ${DB_NAME:-kaptan}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/data:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kaptan -d kaptan']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ── Redis ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kaptan-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ── MinIO (Object Storage for documents) ──────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: kaptan-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kaptan_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?err}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ── Zookeeper (Kafka dependency) ──────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: kaptan-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  # ── Apache Kafka ─────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kaptan-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
      - '9093:9093'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ── Kafka UI (geliştirme izleme) ─────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kaptan-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: kaptan-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ── Apache APISIX Gateway ────────────────────
  apisix:
    image: apache/apisix:3.8.0-debian
    container_name: kaptan-apisix
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - '9080:9080'
      - '9443:9443'
      - '9180:9180'
    volumes:
      - ./apisix/config.yml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yml:/usr/local/apisix/conf/apisix.yaml:ro
    environment:
      APISIX_STAND_ALONE: 'true'

  # ── Backend API (NestJS) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kaptan-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - '3000:3000'
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-kaptan}
      DB_PASS: ${DB_PASS:?err}
      DB_NAME: ${DB_NAME:-kaptan}
      USE_POSTGIS: 'true'
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9093
      JWT_SECRET: ${JWT_SECRET:?err}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?err}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?err}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8081}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-kaptan_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?err}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs

volumes:
  postgres_data:
  redis_data:
  minio_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
