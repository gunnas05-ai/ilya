apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backend-secrets
  labels:
    app: kaptan-backend
type: Opaque
stringData:
  # Production'da bu değerler Vault'tan veya CI/CD secret yönetiminden gelir.
  # Bu template SADECE development/staging içindir.
  DB_PASS: {{ .Values.postgres.env.POSTGRES_PASSWORD | default "kaptan_dev_2026" | quote }}
  JWT_SECRET: {{ .Values.backend.env.JWT_SECRET | default "change-in-production" | quote }}
  JWT_REFRESH_SECRET: {{ .Values.backend.env.JWT_REFRESH_SECRET | default "change-in-production" | quote }}
  IYZICO_API_KEY: {{ .Values.backend.env.IYZICO_API_KEY | default "sandbox-api-key" | quote }}
  IYZICO_SECRET_KEY: {{ .Values.backend.env.IYZICO_SECRET_KEY | default "sandbox-secret-key" | quote }}
  ENCRYPTION_KEY: {{ .Values.backend.env.ENCRYPTION_KEY | default "change-in-production" | quote }}
  TX_SIGNING_SECRET: {{ .Values.backend.env.TX_SIGNING_SECRET | default "change-in-production" | quote }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-backend-config
  labels:
    app: kaptan-backend
data:
  NODE_ENV: {{ .Values.environment | quote }}
  PORT: {{ .Values.backend.env.PORT | default "3000" | quote }}
  DB_HOST: {{ .Values.backend.env.DB_HOST | default "kaptan-postgres" | quote }}
  DB_PORT: {{ .Values.backend.env.DB_PORT | default "5432" | quote }}
  DB_USER: {{ .Values.postgres.env.POSTGRES_USER | default "kaptan" | quote }}
  DB_NAME: {{ .Values.postgres.env.POSTGRES_DB | default "kaptan" | quote }}
  USE_POSTGIS: {{ .Values.backend.env.USE_POSTGIS | default "true" | quote }}
  REDIS_HOST: {{ .Values.backend.env.REDIS_HOST | default "kaptan-redis" | quote }}
  KAFKA_BROKERS: {{ .Values.backend.env.KAFKA_BROKERS | default "kaptan-kafka:9093" | quote }}
  PAYMENT_PROVIDER: {{ .Values.backend.env.PAYMENT_PROVIDER | default "iyzico" | quote }}
  PLATFORM_COMMISSION_RATE: {{ .Values.backend.env.PLATFORM_COMMISSION_RATE | default "3.5" | quote }}
  QUICK_PAY_ENABLED: {{ .Values.backend.env.QUICK_PAY_ENABLED | default "true" | quote }}
  IYZICO_BASE_URL: {{ .Values.backend.env.IYZICO_BASE_URL | default "https://api.iyzipay.com" | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.backend.env.OTEL_EXPORTER_OTLP_ENDPOINT | default "http://kaptan-apisix:4317" | quote }}
  OTEL_SERVICE_NAME: kaptan-backend
