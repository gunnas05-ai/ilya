# Apache APISIX Route Configuration — KAPTAN Enterprise API Gateway
# Stand-alone mode yaml declarative config

upstreams:
  - id: 1
    type: roundrobin
    nodes:
      'backend:3000': 1
    desc: 'KAPTAN NestJS Backend'

routes:
  # ── Enterprise API Routes (Rate Limit: 1000/saat) ──
  - id: 100
    uri: /api/v1/shipments*
    upstream_id: 1
    priority: 20
    plugins:
      key-auth: {}
      limit-count:
        count: 1000
        time_window: 3600
        key_type: var
        key: http_x_api_key
        rejected_code: 429
        rejected_msg: 'Rate limit asildi. Saatlik 1000 istek limitiniz doldu.'
      prometheus:
        prefer_name: true

  - id: 101
    uri: /api/v1/carrier*
    upstream_id: 1
    priority: 20
    plugins:
      key-auth: {}
      limit-count:
        count: 2000
        time_window: 3600
        key_type: var
        key: http_x_api_key
        rejected_code: 429
      prometheus:
        prefer_name: true

  - id: 102
    uri: /api/v1/rates*
    upstream_id: 1
    priority: 20
    plugins:
      key-auth: {}
      limit-count:
        count: 5000
        time_window: 3600
        key_type: var
        key: http_x_api_key
        rejected_code: 429
      prometheus:
        prefer_name: true

  - id: 103
    uri: /api/v1/warehouse*
    upstream_id: 1
    priority: 20
    plugins:
      key-auth: {}
      limit-count:
        count: 500
        time_window: 3600
        key_type: var
        key: http_x_api_key

  - id: 104
    uri: /api/v1/customs*
    upstream_id: 1
    priority: 20
    plugins:
      key-auth: {}
      limit-count:
        count: 300
        time_window: 3600
        key_type: var
        key: http_x_api_key

  # ── Main Backend API (fallback) ──
  - id: 200
    uri: /api/*
    upstream_id: 1
    priority: 10
    plugins:
      cors:
        allow_origins: '*'
        allow_methods: 'GET,POST,PUT,DELETE,PATCH'
        allow_headers: 'Content-Type,Authorization,x-device-fingerprint,Accept-Version,X-API-Key'
        expose_headers: '*'
        max_age: 3600
      limit-count:
        count: 300
        time_window: 60
        key_type: var
        key: remote_addr
        rejected_code: 429
        rejected_msg: 'Cok fazla istek. Lutfen bekleyin.'
      gzip:
        types:
          - 'application/json'
          - 'text/plain'
        min_length: 1024
      request-id:
        header_name: X-Request-Id
      prometheus:
        prefer_name: true

  # ── WebSocket proxy (live tracking) ──
  - id: 300
    uri: /ws/*
    upstream_id: 1
    priority: 15
    enable_websocket: true
    plugins:
      prometheus:
        prefer_name: true

  # ── Health & Monitoring (no auth) ──
  - id: 400
    uri: /api/health*
    upstream_id: 1
    priority: 30
    plugins:
      prometheus:
        prefer_name: true

  - id: 401
    uri: /api/docs*
    upstream_id: 1
    priority: 30

  - id: 402
    uri: /api/metrics*
    upstream_id: 1
    priority: 30

  # ── Public auth endpoints (no API key required) ──
  - id: 500
    uri: /api/v1/auth/*
    upstream_id: 1
    priority: 25
    plugins:
      limit-count:
        count: 20
        time_window: 60
        key_type: var
        key: remote_addr
        rejected_code: 429
        rejected_msg: 'Cok fazla giris denemesi. Lutfen bekleyin.'

# SSL configuration (production)
ssl: []
# ssl:
#   - cert: /path/to/cert.pem
#     key: /path/to/key.pem
#     sni: api.kaptanlojistik.com

# Global rules
global_rules:
  - id: 1
    plugins:
      prometheus:
        prefer_name: true
      real-ip:
        source: http_x_forwarded_for
